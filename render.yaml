services:
  - type: web
    name: quran-backend
    env: node
    plan: free
    # Monorepo: install from repo root (single package-lock.json), then build backend.
    rootDir: backend
    buildCommand: cd .. && npm install --include=optional && npm run build --prefix backend
    startCommand: npm start
    envVars:
      - key: CORS_ORIGIN
        value: "*"

