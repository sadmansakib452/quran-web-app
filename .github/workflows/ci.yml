# Catches Linux-only install/build issues (e.g. Tailwind Oxide / lightningcss native deps) before Vercel.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install (monorepo root)
        run: npm install --include=optional

      - name: Build backend
        run: npm run build --prefix backend

      - name: Build frontend (same as Vercel Linux)
        run: npm run build --prefix frontend
